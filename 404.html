<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — TaserWorld</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-deep: #080c10; --border: #1a2d44; --blue: #0ea5e9; --yellow: #facc15;
      --text-1: #e8edf3; --text-2: #8fa8c0; --text-3: #4d6b85;
    }
    body {
      background: var(--bg-deep); color: var(--text-1);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    .code { font-size: clamp(80px, 15vw, 160px); font-family: 'Barlow Condensed', sans-serif; font-weight: 800; color: var(--yellow); line-height: 1; }
    .msg { font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-2); margin: 20px 0 8px; }
    .sub { font-size: 12px; color: var(--text-3); margin-bottom: 40px; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .links a {
      font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 10px 20px; border: 1px solid var(--border); color: var(--text-2);
      text-decoration: none; transition: border-color 0.15s, color 0.15s;
    }
    .links a:hover { border-color: var(--blue); color: var(--blue); }
    .links a.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .links a.primary:hover { background: #38bdf8; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <p class="msg">Page Not Found</p>
  <p class="sub">// This page does not exist or has moved</p>
  <div class="links">
    <a href="/" class="primary">Back to Directory</a>
    <a href="/dealers/">Find Dealers</a>
    <a href="/laws/">Laws by State</a>
  </div>
  <script>
    // Redirect state sub-pages not yet built to the states index
    var path = window.location.pathname;
    if (path.indexOf('/states/') === 0 && path.length > 8) {
      window.location.replace('/states/');
    }
  </script>
</body>
</html>
